name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run build
      - name: Package (strip leading v from tag)
        run: |
          TAG="${{ github.ref_name }}"
          npx @vscode/vsce package --no-dependencies -o "smartsy-vscode-${TAG#v}.vsix"
      - uses: softprops/action-gh-release@v2
        with:
          files: "*.vsix"
          generate_release_notes: true
